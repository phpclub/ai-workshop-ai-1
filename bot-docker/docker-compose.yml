services:
  angie:
    image: docker.angie.software/angie:1.11.3-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/angie/angie.conf:/etc/angie/angie.conf:ro
      - ./docker/angie/acme.conf:/etc/angie/acme.conf:ro
      - ./docker/angie/ssl.conf:/etc/angie/ssl.conf:ro
      - ./docker/angie/security.conf:/etc/angie/security.conf:ro
      - ./docker/angie/badbot.conf:/etc/angie/badbot.conf:ro
      - ./docker/angie/cache.conf:/etc/angie/cache.conf:ro
      - ./docker/angie/http.d:/etc/angie/http.d:ro
      - ./frontend:/usr/share/angie/html:ro
      - angie_acme:/var/lib/angie/acme

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      KNOWLEDGE_FILE_PATH: ${KNOWLEDGE_FILE_PATH:-/app/data/knowledge}
    volumes:
      - ./data/knowledge:/app/data/knowledge:ro
      - ./system_prompt.txt:/app/system_prompt.txt:ro
    expose:
      - "8080"

volumes:
  postgres_data:
  angie_acme:
