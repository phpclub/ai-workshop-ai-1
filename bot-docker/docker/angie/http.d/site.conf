limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/s;

upstream backend {
    server backend:8080;
    keepalive 8;
}

server {
    listen 443 ssl fastopen=256;
    listen 443 quic reuseport;
    server_name workshop-ai.cutcode.dev;
    client_max_body_size 1M;

    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    root /usr/share/angie/html;
    index index.html;

    location / {
        include /etc/angie/badbot.conf;
        try_files $uri $uri/ /index.html;
    }

    location /webhook {
        limit_req zone=webhook burst=20 nodelay;

        proxy_pass             http://backend;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Connection "";
    }

    include /etc/angie/security.conf;
    include /etc/angie/cache.conf;
    include /etc/angie/ssl.conf;
}

server {
    listen 80;
    server_name workshop-ai.cutcode.dev;

    acme letsencrypt;

    location / {
        return 301 https://$server_name$request_uri;
    }
}
